# Railway asigna el puerto dinamicamente
server.port=${PORT:8081}

# PostgreSQL produccion (Railway inyecta estas variables automaticamente)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JWT seguro en produccion (sobreescribir con variable de entorno)
jwt.secret=${JWT_SECRET}

# CORS (URL del frontend en Railway)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID}
