spring.application.name=english-trainer-api

# Server
server.port=8081

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=english-trainer-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID:placeholder.apps.googleusercontent.com}

# Active profile
spring.profiles.active=dev
