spring.application.name=english-trainer-api

# Server
server.port=8081

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=english-trainer-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID:placeholder.apps.googleusercontent.com}

# Anthropic AI
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:500}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=${MAIL_FROM:noreply@englishtrainer.com}
mail.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Active profile
spring.profiles.active=dev
